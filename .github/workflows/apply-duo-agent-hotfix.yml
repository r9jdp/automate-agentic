name: Apply Duo Agent task ID hotfix

on:
  push:
    branches:
      - main
    paths:
      - .duo-agent-hotfix.patch
      - .github/workflows/apply-duo-agent-hotfix.yml

permissions:
  contents: write

jobs:
  apply-hotfix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate patch
        run: git apply --check .duo-agent-hotfix.patch

      - name: Apply patch
        run: git apply .duo-agent-hotfix.patch

      - name: Run extension tests
        working-directory: duo-bridge-poc
        run: npm test

      - name: Commit verified fix and remove temporary automation
        shell: bash
        run: |
          rm -f .duo-agent-hotfix.patch
          rm -f .github/workflows/apply-duo-agent-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Duo Agent task session ID regression"
          git push origin HEAD:main
